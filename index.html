<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; opacity: 0; transition: opacity 0.5s; }
        .login-card { text-align: center; border: 1px solid #00ffff; padding: 40px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,255,255,0.1); }
        h1 { font-family: 'Orbitron'; color: #00ffff; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: transparent; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; box-sizing: border-box; }
        input:focus { border-color: #00ffff; }
        button { width: 100%; padding: 12px; background: #00ffff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>J.A.R.V.I.S.</h1>
        <p style="font-size: 12px; color: #666; margin-bottom: 20px;">ACCESSING CORE SYSTEM...</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">LOGIN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATc8fbfL086MbvTOVynsPc4ZSHtWcRuQc",
            authDomain: "jarvis-core-v1-ac8fd.firebaseapp.com",
            projectId: "jarvis-core-v1-ac8fd",
            storageBucket: "jarvis-core-v1-ac8fd.firebasestorage.app",
            messagingSenderId: "1086976113832",
            appId: "1:1086976113832:web:5b2ecc409df4c5035c569d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- CHECK IF ALREADY LOGGED IN ---
        setPersistence(auth, browserLocalPersistence).then(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // अगर पहले से लॉगिन है, तो सीधा डैशबोर्ड पर भेजो
                    window.location.replace('dashboard.html');
                } else {
                    // अगर लॉगिन नहीं है, तभी यह पेज दिखाओ
                    document.body.style.opacity = "1";
                }
            });
        });

        window.login = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, e, p);
                window.location.replace('dashboard.html');
            } catch (err) {
                alert("Login Failed: " + err.message);
            }
        };
    </script>
</body>
</html>
