<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | Avengers Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: #00ffff; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .auth-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 20, 35, 0.9); padding: 40px; border: 2px solid #00ffff;
            border-radius: 15px; z-index: 100; text-align: center; width: 85%; max-width: 380px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2); display: none; pointer-events: all;
        }

        h2 { letter-spacing: 4px; margin-bottom: 20px; font-weight: bold; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.7); border: 1px solid #00ffff; color: #fff; border-radius: 5px; outline: none; }
        button { background: transparent; color: #00ffff; border: 1px solid #00ffff; padding: 12px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00ffff; color: #000; box-shadow: 0 0 20px #00ffff; }
        
        .skip-link { font-size: 11px; color: #555; cursor: pointer; display: block; margin-top: 10px; text-decoration: underline; }
        #status-text { position: absolute; top: 5%; width: 100%; text-align: center; z-index: 10; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body onclick="playTheme()">

    <audio id="avengersMusic" loop>
        <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Avengers+Theme&filename=mt/MTI0NTE2OTM0MTI0NjAy_0G_2bjm_2fgX_2f0.mp3" type="audio/mpeg">
    </audio>

    <div id="status-text">SYSTEM STATUS: READY TO INITIALIZE</div>

    <div id="login-box" class="auth-container">
        <h2>CORE LOGIN</h2>
        <input type="email" id="email" placeholder="Gmail Address">
        <input type="password" id="pass" placeholder="Security Password">
        <button onclick="handleLogin()">INITIALIZE PROTOCOL</button>
        <p style="font-size: 11px; margin-top: 10px; cursor: pointer;" onclick="toggleAuth()">New User? Create Access</p>
    </div>

    <div id="profile-box" class="auth-container">
        <h2>USER PROFILE</h2>
        <input type="text" id="nick" placeholder="Nickname (Optional: e.g. Boss)">
        <input type="text" id="phone" placeholder="Phone Number (Optional)">
        <input type="date" id="dob">
        <button onclick="saveProfile()">SYNC DATA</button>
        <span class="skip-link" onclick="location.reload()">SKIP FOR NOW</span>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATc8fbfL086MbvTOVynsPc4ZSHtWcRuQc",
            authDomain: "jarvis-core-v1-ac8fd.firebaseapp.com",
            projectId: "jarvis-core-v1-ac8fd",
            storageBucket: "jarvis-core-v1-ac8fd.firebasestorage.app",
            messagingSenderId: "1086976113832",
            appId: "1:1086976113832:web:5b2ecc409df4c5035c569d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Music Control
        window.playTheme = () => {
            const music = document.getElementById('avengersMusic');
            music.volume = 0.3;
            music.play();
        };

        window.speak = (text, lang = 'en-US') => {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = lang; 
            window.speechSynthesis.speak(msg);
        };

        let isLoginMode = true;
        window.toggleAuth = () => {
            isLoginMode = !isLoginMode;
            document.querySelector("#login-box h2").innerText = isLoginMode ? "CORE LOGIN" : "CREATE ACCESS";
        };

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                if (isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert(e.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('login-box').style.display = 'none';
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('status-text').innerText = `USER: ${data.nickname.toUpperCase()}`;
                    speak(`Welcome back ${data.nickname}. All systems are go.`);
                } else {
                    document.getElementById('profile-box').style.display = 'block';
                }
            } else {
                document.getElementById('login-box').style.display = 'block';
            }
        });

        window.saveProfile = async () => {
            const user = auth.currentUser;
            const nick = document.getElementById('nick').value || "Boss";
            await setDoc(doc(db, "users", user.uid), {
                nickname: nick,
                phone: document.getElementById('phone').value,
                dob: document.getElementById('dob').value
            });
            location.reload();
        };
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 3D Visualizer (Jarvis Core)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 3), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true }));
        scene.add(sphere);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
