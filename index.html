<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | VIKASH INDUSTRIES</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: #00ffff; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #boot-screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .brand-small { font-size: 14px; letter-spacing: 5px; margin-bottom: 20px; color: #00ffff; text-transform: uppercase; }
        #boot-btn { background: transparent; color: #00ffff; border: 1px solid #00ffff; padding: 12px 35px; font-size: 14px; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 2px; }

        .auth-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 10, 20, 0.95); padding: 30px; border: 1px solid #00ffff;
            z-index: 100; text-align: center; width: 85%; max-width: 380px; display: none;
        }
        .input-group { position: relative; width: 100%; }
        input { width: 90%; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border: none; border-bottom: 1px solid #00ffff; color: #fff; font-family: 'Orbitron'; outline: none; }
        
        /* Show/Hide Password Toggle */
        .toggle-password { position: absolute; right: 25px; top: 20px; cursor: pointer; font-size: 10px; color: #00ffff; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .action-btn { background: #00ffff; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; font-family: 'Orbitron'; text-transform: uppercase; }
        .google-btn { background: #fff; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; font-family: 'Orbitron'; font-size: 12px; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="brand-small">VIKASH INDUSTRIES</div>
        <button id="boot-btn" onclick="runJarvis()">INITIALIZE SYSTEM</button>
    </div>

    <audio id="audioEngine" loop>
        <source src="Theme.mp3" type="audio/mpeg">
    </audio>

    <div id="login-box" class="auth-container">
        <h2 id="auth-title">SIGN IN</h2>
        <input type="email" id="email" placeholder="Email Address">
        
        <div class="input-group">
            <input type="password" id="pass" placeholder="Password">
            <span class="toggle-password" onclick="togglePass()">SHOW</span>
        </div>
        
        <div class="btn-group">
            <button class="action-btn" onclick="handleAuth()">Access Core</button>
            <button class="google-btn" onclick="googleLogin()">Continue with Google</button>
            <p id="toggle-text" style="font-size: 10px; cursor: pointer;" onclick="toggleMode()">New to J.A.R.V.I.S? Create Account</p>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATc8fbfL086MbvTOVynsPc4ZSHtWcRuQc",
            authDomain: "jarvis-core-v1-ac8fd.firebaseapp.com",
            projectId: "jarvis-core-v1-ac8fd",
            storageBucket: "jarvis-core-v1-ac8fd.firebasestorage.app",
            messagingSenderId: "1086976113832",
            appId: "1:1086976113832:web:5b2ecc409df4c5035c569d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const player = document.getElementById('audioEngine');
        let isSignUp = false;

        window.runJarvis = () => {
            if (player) { player.volume = 0.6; player.play(); }
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
        };

        window.togglePass = () => {
            const p = document.getElementById('pass');
            const t = document.querySelector('.toggle-password');
            if (p.type === "password") { p.type = "text"; t.innerText = "HIDE"; }
            else { p.type = "password"; t.innerText = "SHOW"; }
        };

        window.toggleMode = () => {
            isSignUp = !isSignUp;
            document.getElementById('auth-title').innerText = isSignUp ? "CREATE ACCOUNT" : "SIGN IN";
            document.getElementById('toggle-text').innerText = isSignUp ? "Already have access? Sign In" : "New Account? Create";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            const adminEmail = "Vikashjonwal2406@gmail.com";

            try {
                if (isSignUp) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(res.user);
                    alert("Verification link sent! Check Inbox/Spam.");
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                    if (player) player.pause();
                    window.location.href = (email.toLowerCase() === adminEmail.toLowerCase()) ? 'admin.html' : 'dashboard.html';
                }
            } catch (e) { alert("Error: " + e.message); }
        };

        window.googleLogin = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                if (player) player.pause();
                window.location.href = 'dashboard.html';
            } catch (e) { alert(e.message); }
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 3), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.15 }));
        scene.add(core); camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); core.rotation.y += 0.005; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
