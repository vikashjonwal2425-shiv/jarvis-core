<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | VIKASH INDUSTRIES</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: #00ffff; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Boot Screen */
        #boot-screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .brand-name { font-size: 14px; letter-spacing: 5px; margin-bottom: 20px; color: rgba(0, 255, 255, 0.8); text-transform: uppercase; }
        #boot-btn { background: transparent; color: #00ffff; border: 1px solid #00ffff; padding: 12px 30px; font-size: 14px; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 2px; transition: 0.3s; }
        #boot-btn:hover { background: rgba(0, 255, 255, 0.2); box-shadow: 0 0 20px #00ffff; }

        /* Login Container */
        .auth-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 15, 25, 0.95); padding: 35px; border: 1px solid #00ffff;
            z-index: 100; text-align: center; width: 85%; max-width: 350px;
            display: none; box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);
        }
        h2 { font-size: 16px; letter-spacing: 3px; margin-bottom: 25px; color: #fff; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border: none; border-bottom: 1px solid #00ffff; color: #fff; font-family: 'Orbitron'; outline: none; }
        .action-btn { background: #00ffff; color: #000; border: none; padding: 12px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; font-family: 'Orbitron'; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="brand-name">VIKASH INDUSTRIES</div>
        <button id="boot-btn" onclick="initializeSystem()">INITIALIZE SYSTEM</button>
    </div>

    <audio id="avengersTheme" loop>
        <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Avengers+Theme&filename=mt/MTI0NTE2OTM0MTI0NjAy_0G_2bjm_2fgX_2f0.mp3" type="audio/mpeg">
    </audio>

    <div id="login-box" class="auth-container">
        <h2>SECURE AUTHENTICATION</h2>
        <input type="email" id="email" placeholder="GMAIL ADDRESS">
        <input type="password" id="pass" placeholder="ACCESS KEY">
        <button class="action-btn" onclick="handleLogin()">ACCESS CORE</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATc8fbfL086MbvTOVynsPc4ZSHtWcRuQc",
            authDomain: "jarvis-core-v1-ac8fd.firebaseapp.com",
            projectId: "jarvis-core-v1-ac8fd",
            storageBucket: "jarvis-core-v1-ac8fd.firebasestorage.app",
            messagingSenderId: "1086976113832",
            appId: "1:1086976113832:web:5b2ecc409df4c5035c569d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const theme = document.getElementById('avengersTheme');

        window.initializeSystem = () => {
            // Force play theme
            theme.volume = 0.5;
            theme.play().catch(e => console.log("Audio Error:", e));
            
            // UI Transition
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
        };

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                theme.pause(); // Stop theme on success
                alert("Access Granted!");
            } catch (e) { alert("Access Denied: " + e.message); }
        };
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 3), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.2 }));
        scene.add(core); camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); core.rotation.y += 0.005; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
