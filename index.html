<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | System Online</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Futuristic UI Layout */
        .ui-overlay {
            position: absolute; width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; box-sizing: border-box; z-index: 10;
        }

        .header { 
            color: #00ffff; letter-spacing: 5px; text-shadow: 0 0 10px #00ffff;
            border-left: 3px solid #00ffff; padding-left: 15px;
        }
        
        .footer { 
            color: rgba(0, 255, 255, 0.5); font-size: 14px; 
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        #status-light {
            width: 10px; height: 10px; background: #00ffff;
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 10px #00ffff; animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        #clock { font-size: 24px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div class="header">
            <h2>J.A.R.V.I.S.</h2>
            <div id="clock">00:00:00</div>
        </div>
        
        <div class="footer">
            <div>
                <span id="status-light"></span> SYSTEM: <span id="status-text">CALIBRATING...</span>
            </div>
            <div>AUTHENTICATED USER: <b>VIKASH</b><br>ACCESS LEVEL: <b>BOSS</b></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- CLOCK ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        // --- 3D SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- THE FACE (Holographic Mesh) ---
        // जार्विस का चेहरा बनाने के लिए हमने एक Icosahedron का इस्तेमाल किया है जो तकनीकी (Tech) लुक देता है
        const faceGeometry = new THREE.IcosahedronGeometry(1.8, 3);
        const faceMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.6
        });
        const face = new THREE.Mesh(faceGeometry, faceMaterial);
        scene.add(face);

        // Inner Core (चमकता हुआ हिस्सा)
        const coreGeo = new THREE.SphereGeometry(0.7, 32, 32);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.2 });
        const core = new THREE.Mesh(coreGeo, coreMat);
        scene.add(core);

        camera.position.z = 5;

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            face.rotation.y += 0.005; // चेहरा धीरे-धीरे घूमेगा
            face.rotation.x += 0.002;
            
            // जार्विस की "साँसें" (Subtle Pulse)
            let time = Date.now() * 0.002;
            let pulse = 1 + Math.sin(time) * 0.05;
            face.scale.set(pulse, pulse, pulse);
            
            renderer.render(scene, camera);
        }
        animate();

        // Status Update
        setTimeout(() => {
            document.getElementById('status-text').innerText = "ONLINE";
        }, 3000);

        // Responsive Screen
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
