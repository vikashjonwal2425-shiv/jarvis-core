<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. | STARK INDUSTRIES</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #00ffff; font-family: 'JetBrains Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Central Pulse Reactor */
        .reactor-container { height: 40%; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 1px solid rgba(0, 255, 255, 0.1); }
        .reactor { width: 120px; height: 120px; border: 2px solid #00ffff; border-radius: 50%; box-shadow: 0 0 20px #00ffff, inset 0 0 20px #00ffff; animation: pulse 2s infinite; display: flex; align-items: center; justify-content: center; }
        .inner-core { width: 40px; height: 40px; background: #00ffff; border-radius: 50%; box-shadow: 0 0 40px #00ffff; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        /* Status Text */
        .status-bar { padding: 10px 20px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; background: rgba(0, 255, 255, 0.05); }

        /* Chat History */
        #chat-log { flex-grow: 1; overflow-y: auto; padding: 20px; font-size: 13px; line-height: 1.6; }
        .msg { margin-bottom: 15px; border-left: 2px solid rgba(0, 255, 255, 0.2); padding-left: 10px; }
        .user-tag { color: #fff; font-weight: bold; margin-bottom: 4px; display: block; }
        .jarvis-tag { color: #00ffff; font-weight: bold; margin-bottom: 4px; display: block; }

        /* Clean Input */
        .input-area { padding: 20px; background: #050505; border-top: 1px solid rgba(0, 255, 255, 0.1); display: flex; gap: 10px; }
        input { flex-grow: 1; background: transparent; border: 1px solid #111; border-bottom: 1px solid #00ffff; color: #fff; padding: 12px; outline: none; font-family: 'JetBrains Mono'; }
        button { background: #00ffff; border: none; padding: 0 20px; color: #000; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div class="status-bar">Systems: Online | Protocol: Mark 1 | User: Vikas</div>

    <div class="reactor-container">
        <div class="reactor"><div class="inner-core"></div></div>
    </div>

    <div id="chat-log">
        <div class="msg"><span class="jarvis-tag">J.A.R.V.I.S. :</span> सर, मैं आपके निर्देशों के लिए तैयार हूँ। आप क्या करना चाहेंगे?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Enter Command..." autocomplete="off">
        <button onclick="sendCmd()">SEND</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyATc8fbfL086MbvTOVynsPc4ZSHtWcRuQc", authDomain: "jarvis-core-v1-ac8fd.firebaseapp.com", projectId: "jarvis-core-v1-ac8fd" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => { if(!user) window.location.replace('index.html'); });

        window.sendCmd = async () => {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;

            addMsg('Vikas', val, 'user-tag');
            input.value = "";

            try {
                // Gemini AI Integration
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${firebaseConfig.apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "You are JARVIS, the AI from Iron Man. Keep your answers brief, professional, and address the user as 'Sir' or 'Boss'. User input: " + val }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                addMsg('J.A.R.V.I.S.', reply, 'jarvis-tag');
            } catch (e) {
                addMsg('System', 'कलेक्शन में एरर है, सर।', 'jarvis-tag');
            }
        };

        function addMsg(user, text, tagClass) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="${tagClass}">${user} :</span> ${text}`;
            const log = document.getElementById('chat-log');
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendCmd(); });
    </script>
</body>
</html>
