<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #00ffff; font-family: 'Orbitron', sans-serif; display: flex; height: 100vh; }
        /* Sidebar */
        .sidebar { width: 250px; background: rgba(0, 20, 30, 0.8); border-right: 1px solid #00ffff; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(0,255,255,0.1); transition: 0.3s; }
        .nav-item:hover { background: rgba(0,255,255,0.1); }
        
        /* Main Chat Area */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }
        
        .chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 5px; max-width: 70%; }
        .user-msg { align-self: flex-end; background: rgba(0,255,255,0.2); border: 1px solid #00ffff; }
        .jarvis-msg { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.3); }
        
        .input-area { padding: 20px; background: rgba(0,0,0,0.8); display: flex; gap: 10px; }
        input { flex-grow: 1; background: transparent; border: 1px solid #00ffff; color: #fff; padding: 12px; outline: none; }
        button { background: #00ffff; color: #000; border: none; padding: 10px 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3 style="font-size: 14px; letter-spacing: 2px;">VIKASH INDUSTRIES</h3>
        <div class="nav-item">Core Chat</div>
        <div class="nav-item">Image Gen</div>
        <div class="nav-item">My Plan: <span id="user-plan">Free</span></div>
        <div style="margin-top: auto;" class="nav-item" onclick="logout()">Logout</div>
    </div>

    <div class="main-content">
        <div id="canvas-container"></div>
        <div class="chat-window" id="chat">
            <div class="message jarvis-msg">Systems active. How can I help you today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Send a command...">
            <button onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* वही कॉन्फ़िग यहाँ डालें जो index.html में है */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.sendMessage = async () => {
            const input = document.getElementById('userInput');
            const msg = input.value;
            if(!msg) return;

            // 1. UI में मैसेज दिखाओ
            document.getElementById('chat').innerHTML += `<div class="message user-msg">${msg}</div>`;
            
            // 2. एडमिन के लिए डेटा लॉग करो (यही वो कंट्रोल है जो आपको चाहिए)
            await addDoc(collection(db, "user_activity"), {
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                query: msg,
                timestamp: new Date()
            });

            input.value = '';
        };

        window.logout = () => signOut(auth).then(() => location.href = 'index.html');
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    </body>
</html>
