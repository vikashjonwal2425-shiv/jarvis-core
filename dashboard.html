<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. | PRO</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #080a0c; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

        /* Top Header */
        .header { background: #111; padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 16px; color: #00ffff; letter-spacing: 1px; }
        .user-id { font-size: 10px; color: #666; }

        /* Chat Window */
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: #00ffff; color: #000; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1c1f23; border-bottom-left-radius: 2px; border: 1px solid #333; }

        /* Input Area - Floating & Fixed */
        .input-container { background: #111; padding: 10px; border-top: 1px solid #222; }
        .toolbar { display: flex; gap: 15px; padding: 5px 10px 10px 10px; }
        .tool-btn { background: transparent; border: none; color: #888; cursor: pointer; font-size: 18px; }

        .input-wrapper { display: flex; background: #1c1f23; border-radius: 25px; padding: 5px 15px; align-items: center; border: 1px solid #333; }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 10px; outline: none; font-size: 15px; }
        .send-btn { background: #00ffff; border: none; width: 35px; height: 35px; border-radius: 50%; color: #000; font-weight: bold; margin-left: 10px; display: flex; align-items: center; justify-content: center; }

        /* Loader */
        #loader { display: none; font-size: 10px; color: #00ffff; margin-left: 15px; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>J.A.R.V.I.S.</h1>
        <div class="user-id">ADMIN: VIKASH</div>
    </div>

    <div id="chat-window">
        <div class="msg ai">प्रणाम विकास जी। सिस्टम तैयार है। मैं आपकी क्या सेवा कर सकता हूँ?</div>
    </div>

    <div id="loader">جار्विस सोच रहा है...</div>

    <div class="input-container">
        <div class="toolbar">
            <button class="tool-btn" onclick="alert('कैमरा ओपन हो रहा है...')">📷</button>
            <button class="tool-btn" onclick="alert('फाइल मैनेजर ओपन हो रहा है...')">📁</button>
            <button class="tool-btn" onclick="alert('माइक एक्टिवेट हो रहा है...')">🎤</button>
        </div>
        
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="यहाँ संदेश लिखें..." autocomplete="off">
            <button class="send-btn" onclick="askJarvis()">➔</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyATc8fbfL086MbvTOVynsPc4ZSHtWcRuQc", authDomain: "jarvis-core-v1-ac8fd.firebaseapp.com", projectId: "jarvis-core-v1-ac8fd" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => { if(!user) window.location.replace('index.html'); });

        window.askJarvis = async () => {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            addMsg(text, 'user');
            input.value = "";
            document.getElementById('loader').style.display = "block";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${firebaseConfig.apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await res.json();
                addMsg(data.candidates[0].content.parts[0].text, 'ai');
            } catch (e) {
                addMsg("क्षमा करें सर, कुछ तकनीकी समस्या है।", 'ai');
            } finally {
                document.getElementById('loader').style.display = "none";
            }
        };

        function addMsg(t, c) {
            const div = document.createElement('div');
            div.className = `msg ${c}`;
            div.innerText = t;
            const win = document.getElementById('chat-window');
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        // Enter key support
        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') askJarvis(); });
    </script>
</body>
</html>
