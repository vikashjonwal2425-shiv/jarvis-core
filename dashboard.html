<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. | NEURAL INTERFACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #00ffff; --dim-glow: rgba(0, 255, 255, 0.3); --bg: #01060a; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR (Neural Nav) --- */
        .sidebar { width: 60px; background: rgba(0, 0, 0, 0.4); border-right: 1px solid rgba(0, 255, 255, 0.1); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; z-index: 10; }
        .side-icon { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #444; border: 1px solid transparent; transition: 0.3s; }
        .side-icon.active { color: var(--glow); background: rgba(0, 255, 255, 0.05); border-color: var(--dim-glow); box-shadow: 0 0 10px var(--dim-glow); }
        .side-icon svg { width: 20px; height: 20px; fill: currentColor; }

        /* --- MAIN CONTENT --- */
        .main-container { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        
        /* --- TOP HEADER (Status Panel) --- */
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(0,255,255,0.05); }
        .title-area h1 { font-family: 'Orbitron'; font-size: 14px; margin: 0; letter-spacing: 2px; color: var(--glow); display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 6px; height: 6px; background: var(--glow); border-radius: 50%; box-shadow: 0 0 8px var(--glow); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-family: 'JetBrains Mono'; font-size: 8px; color: #555; margin-top: 10px; text-transform: uppercase; }
        .stat-val { color: var(--glow); opacity: 0.8; }

        /* --- CENTRAL CORE --- */
        .visual-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .core-sphere { width: 160px; height: 160px; background: var(--glow); border-radius: 50%; filter: blur(40px); opacity: 0.2; position: absolute; }
        .orbital-rings { width: 220px; height: 220px; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; position: absolute; }
        .orbital-rings::before { content: ''; position: absolute; inset: -10px; border: 1px solid rgba(0,255,255,0.05); border-radius: 50%; animation: spin 10s linear infinite; }
        .status-text { font-family: 'Orbitron'; text-align: center; z-index: 2; }
        .status-text h2 { font-size: 18px; margin: 10px 0 5px; letter-spacing: 4px; }
        .status-text p { font-size: 10px; color: #666; margin: 0; letter-spacing: 1px; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- BOTTOM INPUT DECK --- */
        .footer { padding: 20px; position: relative; }
        .input-deck { background: rgba(10, 20, 30, 0.6); border: 1px solid rgba(0, 255, 255, 0.1); border-radius: 18px; padding: 12px; backdrop-filter: blur(10px); }
        .msg-input { width: 100%; background: transparent; border: none; color: #fff; padding: 10px; font-size: 14px; outline: none; margin-bottom: 10px; }
        .tool-bar { display: flex; align-items: center; justify-content: space-between; }
        .tools-left { display: flex; gap: 15px; }
        .tool-btn { background: transparent; border: none; padding: 5px; color: #555; cursor: pointer; }
        .tool-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .send-btn { background: rgba(0, 255, 255, 0.1); border: 1px solid var(--dim-glow); width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--glow); }

        /* --- ADMIN BADGE --- */
        .admin-badge { position: absolute; top: 15px; right: 15px; background: rgba(100, 50, 255, 0.1); border: 1px solid rgba(100, 50, 255, 0.3); padding: 5px 12px; border-radius: 6px; font-size: 9px; font-family: 'Orbitron'; color: #a280ff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-icon" style="color:var(--glow)"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5-10-5-10 5z"/></svg></div>
        <div class="side-icon active"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
        <div class="side-icon"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></div>
        <div class="side-icon" style="margin-top:auto;"><svg viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg></div>
    </div>

    <div class="main-container">
        <div class="header">
            <div class="title-area">
                <h1><div class="status-dot"></div> J.A.R.V.I.S. | ONLINE</h1>
                <div class="stats-grid">
                    <div>SYS.INTEGRITY: <span class="stat-val">100%</span></div>
                    <div>UPTIME: <span class="stat-val" id="uptime">00:00:14</span></div>
                    <div>UPLINK: <span class="stat-val">SECURE</span></div>
                    <div>MODEL: <span class="stat-val">JARVIS.V3</span></div>
                </div>
            </div>
            <div class="admin-badge">🛡️ ADMIN</div>
        </div>

        <div class="visual-area">
            <div class="core-sphere"></div>
            <div class="orbital-rings"></div>
            <div class="status-text">
                <p style="color:var(--glow)">● STANDBY</p>
                <h2>SYSTEMS ONLINE</h2>
                <p>Awaiting your directive, Boss.</p>
            </div>
        </div>

        <div class="footer">
            <div class="input-deck">
                <input type="text" class="msg-input" placeholder="Message Jarvis... (try: draw a sunset)" id="userInput">
                <div class="tool-bar">
                    <div class="tools-left">
                        <button class="tool-btn"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></button>
                        <button class="tool-btn"><svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg></button>
                        <button class="tool-btn"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
                    </div>
                    <button class="send-btn" id="sendBtn"><svg viewBox="0 0 24 24" style="width:18px;height:18px"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyATc8fbfL086MbvTOVynsPc4ZSHtWcRuQc", authDomain: "jarvis-core-v1-ac8fd.firebaseapp.com", projectId: "jarvis-core-v1-ac8fd" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Security Check
        onAuthStateChanged(auth, (user) => { 
            if(!user || user.email !== "vikashjonwal2406@gmail.com") window.location.replace('index.html'); 
        });

        // Uptime Timer (सिर्फ दिखावे के लिए जैसा फोटो में है)
        let seconds = 14;
        setInterval(() => {
            seconds++;
            let hrs = Math.floor(seconds / 3600).toString().padStart(2, '0');
            let mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            let secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('uptime').innerText = `${hrs}:${mins}:${secs}`;
        }, 1000);

        // Send Button Logic
        document.getElementById('sendBtn').onclick = () => {
            const val = document.getElementById('userInput').value;
            if(val) alert("Command Processed: " + val);
        };
    </script>
</body>
</html>
