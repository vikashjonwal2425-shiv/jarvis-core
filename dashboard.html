<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | SUPREME</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --glow: #00ffff; --bg: #000; --card-bg: #111; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Top Navigation */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .brand { font-family: 'Orbitron'; font-size: 14px; letter-spacing: 2px; color: var(--glow); }

        /* Welcome Section */
        .hero { padding: 30px 20px 10px; }
        .hero h1 { font-size: 26px; margin: 0; font-weight: 400; }
        .hero h2 { font-size: 22px; margin: 5px 0 0 0; color: #888; font-weight: 600; }

        /* Professional Action Grid */
        .grid { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; overflow-y: auto; flex-grow: 1; padding-bottom: 120px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 12px; transition: 0.3s; border: 1px solid #222; }
        .card:active { transform: scale(0.96); background: #1a1a1a; }
        .card-icon { color: var(--glow); width: 22px; height: 22px; }
        .card-label { font-size: 14px; font-weight: 500; }

        /* Fixed Bottom Search Bar */
        .search-container { position: fixed; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, #000 30%); box-sizing: border-box; }
        .input-box { background: #1a1a1a; border-radius: 35px; display: flex; align-items: center; padding: 6px 15px; border: 1px solid #333; }
        .input-box input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 16px; outline: none; font-family: 'Inter'; }
        
        .action-btn { background: transparent; border: none; color: #888; cursor: pointer; padding: 8px; display: flex; align-items: center; transition: 0.2s; }
        .action-btn:hover { color: var(--glow); }
        .send-btn { color: var(--glow); }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">J.A.R.V.I.S.</div>
        <button class="action-btn"><i data-lucide="settings" style="width:20px;"></i></button>
    </div>

    <div class="hero">
        <h1 id="user-greeting">नमस्ते, Boss!</h1>
        <h2>कहाँ से शुरुआत करें?</h2>
    </div>

    <div class="grid">
        <div class="card"><i data-lucide="image" class="card-icon"></i><span class="card-label">इमेज बनाएँ</span></div>
        <div class="card"><i data-lucide="music" class="card-icon"></i><span class="card-label">संगीत बनाएँ</span></div>
        <div class="card"><i data-lucide="newspaper" class="card-icon"></i><span class="card-label">ताज़ा ख़बरें</span></div>
        <div class="card"><i data-lucide="code" class="card-icon"></i><span class="card-label">कोडिंग मदद</span></div>
        <div class="card"><i data-lucide="video" class="card-icon"></i><span class="card-label">वीडियो बनाएँ</span></div>
        <div class="card"><i data-lucide="cpu" class="card-icon"></i><span class="card-label">सिस्टम स्टेटस</span></div>
    </div>

    <div class="search-container">
        <div class="input-box">
            <button class="action-btn"><i data-lucide="plus" style="width:22px;"></i></button>
            <input type="text" id="userInput" placeholder="Ask J.A.R.V.I.S...">
            <button class="action-btn"><i data-lucide="mic" style="width:22px;"></i></button>
            <button class="action-btn send-btn" onclick="sendMessage()"><i data-lucide="send-horizontal" style="width:22px;"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = { /* Your Existing Config */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    document.getElementById('user-greeting').innerText = `नमस्ते, ${docSnap.data().nickname}!`;
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        window.sendMessage = () => {
            const msg = document.getElementById('userInput').value;
            if(msg) {
                alert("Boss, processing: " + msg);
                document.getElementById('userInput').value = '';
            }
        };

        // Icons Initialize
        lucide.createIcons();
    </script>
</body>
</html>
