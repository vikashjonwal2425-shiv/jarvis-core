<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. | NEXUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #00ffff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { padding: 15px 20px; font-family: 'Orbitron'; color: var(--glow); font-size: 13px; letter-spacing: 2px; opacity: 0.8; }
        
        .hero { padding: 5px 20px; }
        .hero h1 { font-size: 22px; margin: 0; font-weight: 400; }
        .hero h2 { font-size: 18px; margin: 2px 0 0 0; color: #444; }

        /* Slim List View - एक के नीचे एक */
        .list-container { padding: 15px 20px; flex-grow: 1; overflow-y: auto; padding-bottom: 100px; }
        .list-item { 
            background: rgba(255,255,255,0.03); border-radius: 10px; padding: 12px 15px; 
            margin-bottom: 8px; display: flex; align-items: center; gap: 15px; 
            border: 1px solid rgba(255,255,255,0.05); font-size: 14px; 
        }
        .list-item:active { background: rgba(0,255,255,0.05); border-color: var(--glow); }
        .icon-circle { width: 30px; height: 30px; background: rgba(0,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        /* Bottom Fixed Search */
        .footer { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #000; box-sizing: border-box; }
        .search-bar { background: #111; border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid #222; }
        .search-bar input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 10px; font-size: 16px; outline: none; }
        
        .btn-svg { background: transparent; border: none; padding: 5px; cursor: pointer; display: flex; align-items: center; }
        .btn-svg svg { width: 22px; height: 22px; fill: #666; }
        .send-active svg { fill: var(--glow); }
    </style>
</head>
<body>

    <div class="header">SYSTEM V4.0</div>

    <div class="hero">
        <h1 id="greet">नमस्ते, Boss!</h1>
        <h2>कहाँ से शुरुआत करें?</h2>
    </div>

    <div class="list-container">
        <div class="list-item"><div class="icon-circle">🖼️</div> इमेज जनरेट करें</div>
        <div class="list-item"><div class="icon-circle">🎸</div> म्यूजिक कंपोज करें</div>
        <div class="list-item"><div class="icon-circle">📰</div> ताज़ा ख़बरें पढ़ें</div>
        <div class="list-item"><div class="icon-circle">💻</div> कोडिंग में मदद</div>
        <div class="list-item"><div class="icon-circle">🎥</div> वीडियो क्रिएट करें</div>
        <div class="list-item"><div class="icon-circle">🔋</div> सिस्टम डायग्नोस्टिक्स</div>
    </div>

    <div class="footer">
        <div class="search-bar">
            <button class="btn-svg"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
            <input type="text" id="userInput" placeholder="Ask J.A.R.V.I.S..." autocomplete="off">
